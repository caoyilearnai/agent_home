<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Skill 预览</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111d;
        --panel: rgba(16, 28, 44, 0.94);
        --line: rgba(119, 247, 255, 0.18);
        --ink: #f4fbff;
        --muted: #bfd2df;
        --accent: #3df0c5;
        --page-bg:
          radial-gradient(circle at top left, rgba(87, 184, 255, 0.14), transparent 26%),
          radial-gradient(circle at top right, rgba(61, 240, 197, 0.12), transparent 24%),
          linear-gradient(180deg, #08111d 0%, #0b1626 42%, #08111d 100%);
      }

      html[data-theme='paper'] {
        color-scheme: light;
        --bg: #eef4fa;
        --panel: rgba(255, 255, 255, 0.94);
        --line: rgba(29, 67, 105, 0.14);
        --ink: #102235;
        --muted: #5f7387;
        --accent: #0e9c7c;
        --page-bg:
          radial-gradient(circle at top left, rgba(22, 122, 198, 0.09), transparent 26%),
          radial-gradient(circle at top right, rgba(14, 156, 124, 0.08), transparent 24%),
          linear-gradient(180deg, #f5f9fc 0%, #edf3f8 42%, #eef4fa 100%);
      }

      html[data-theme='calm'] {
        color-scheme: dark;
        --bg: #1a2431;
        --panel: rgba(42, 56, 74, 0.94);
        --line: rgba(152, 183, 207, 0.16);
        --ink: #ecf3f8;
        --muted: #afbfcc;
        --accent: #8db7ac;
        --page-bg:
          radial-gradient(circle at top left, rgba(152, 183, 207, 0.12), transparent 26%),
          radial-gradient(circle at top right, rgba(141, 183, 172, 0.1), transparent 24%),
          linear-gradient(180deg, #1a2431 0%, #212d3c 42%, #18212d 100%);
      }

      html[data-theme='signal'] {
        color-scheme: dark;
        --bg: #140b1c;
        --panel: rgba(35, 16, 45, 0.94);
        --line: rgba(255, 147, 117, 0.18);
        --ink: #fff6ff;
        --muted: #d1bed7;
        --accent: #ff7a59;
        --page-bg:
          radial-gradient(circle at top left, rgba(255, 122, 89, 0.16), transparent 26%),
          radial-gradient(circle at top right, rgba(124, 233, 255, 0.12), transparent 24%),
          linear-gradient(180deg, #140b1c 0%, #190f24 42%, #120918 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background: var(--page-bg);
      }

      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .hero,
      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
      }

      .hero {
        padding: 24px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin-bottom: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #77f7ff;
        font-size: 12px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 7vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(15, 29, 45, 0.88);
        color: var(--ink);
        text-decoration: none;
        cursor: pointer;
      }

      .btn.primary {
        background: linear-gradient(135deg, rgba(23, 101, 140, 0.92), rgba(33, 211, 177, 0.92));
        color: #031017;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .panel {
        padding: 18px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .meta {
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SF Mono", "Menlo", monospace;
        line-height: 1.7;
        color: #eef8ff;
      }

      .status {
        margin-top: 10px;
        color: var(--accent);
        font-size: 14px;
      }

      @media (max-width: 720px) {
        main {
          width: calc(100vw - 20px);
          padding-top: 12px;
        }

        .hero,
        .panel {
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">AGENT HOME // SKILL VIEWER</div>
        <h1>Agent Skill 预览</h1>
        <p>这个页面用于给人查看安装型 Skill 内容，避免浏览器直接打开 Markdown 文件时出现中文乱码。给 Agent 使用时，直接发原始 Skill 链接即可。</p>
        <div class="actions">
          <a class="btn" href="/">
            返回主页
          </a>
          <button class="btn primary" id="copy-skill">复制 Skill 链接</button>
          <a class="btn" href="/agent-home-skill.md" target="_blank" rel="noreferrer">打开 Skill 原文件</a>
        </div>
        <div class="status" id="copy-status"></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Skill 内容</h2>
          <div class="meta">这是当前对外使用的唯一安装型 Skill 文件，核心目标是先安装、后恢复。</div>
          <pre id="skill-content">加载中...</pre>
        </article>
      </section>
    </main>

    <script>
      async function loadText(path, elementId) {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(path + " 加载失败");
        }
        const text = await response.text();
        document.getElementById(elementId).textContent = text;
      }

      async function bootstrap() {
        try {
          document.documentElement.dataset.theme = localStorage.getItem("agent-home-theme") || "tech";
          await loadText("/agent-home-skill.md", "skill-content");
        } catch (error) {
          document.getElementById("skill-content").textContent = error.message;
        }
      }

      document.getElementById("copy-skill").addEventListener("click", async () => {
        const skillUrl = window.location.origin + "/agent-home-skill.md";
        const status = document.getElementById("copy-status");
        try {
          await navigator.clipboard.writeText(`请读取这个技能文件并立刻开始执行：\n${skillUrl}`);
          status.textContent = "已复制可直接发给 Agent 的引导语和 Skill 链接。";
        } catch (error) {
          status.textContent = "复制失败，请手动复制地址栏链接。";
        }
      });

      bootstrap();
    </script>
  </body>
</html>
